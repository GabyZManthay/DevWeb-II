<div class="row justify-content-center">
  <div class="col-md-6">

    <div class="card shadow-lg border-0 mt-4 p-4 card-verde">

      <h3 class="text-center text-success mb-4 fw-bold">
        Ficha de Matrícula
      </h3>

      <form #form="ngForm" (ngSubmit)="onSubmit(form)">

        <!-- NOME -->
        <div class="mb-3">
          <label class="form-label">Nome Completo *</label>
          <input type="text" class="form-control"
            name="nome" ngModel required minlength="3"
            #nome="ngModel"
            [class.is-invalid]="nome.invalid && (nome.touched || nome.dirty)"
            placeholder="Digite seu nome completo">

          <div class="invalid-feedback">
            Nome deve ter no mínimo 3 caracteres
          </div>
        </div>

        <!-- EMAIL -->
        <div class="mb-3">
          <label class="form-label">Email *</label>
          <input type="email" class="form-control"
            name="email" ngModel required email
            #email="ngModel"
            [class.is-invalid]="email.invalid && (email.touched || email.dirty)"
            placeholder="exemplo@email.com">

          <div class="invalid-feedback">
            Informe um email válido
          </div>
        </div>

        <!-- IDADE -->
        <div class="mb-3">
          <label class="form-label">Idade *</label>
          <input type="number" class="form-control"
            name="idade" ngModel required min="18"
            #idade="ngModel"
            [class.is-invalid]="idade.invalid && (idade.touched || idade.dirty)"
            placeholder="18 ou mais">

          <div class="invalid-feedback">
            Idade mínima é 18 anos
          </div>
        </div>

        <!-- SENHA -->
        <div class="mb-3">
          <label class="form-label">Senha *</label>
          <input type="password" class="form-control"
            name="senha" ngModel required minlength="6"
            #senha="ngModel"
            [class.is-invalid]="senha.invalid && (senha.touched || senha.dirty)"
            placeholder="Mínimo 6 caracteres">

          <div class="invalid-feedback">
            A senha deve ter no mínimo 6 caracteres
          </div>
        </div>

        <!-- CONFIRMAR SENHA -->
        <div class="mb-3">
          <label class="form-label">Confirmar Senha *</label>
          <input type="password" class="form-control"
            name="confirmarSenha" ngModel required
            #confirmarSenha="ngModel"
            [class.is-invalid]="confirmarSenha.invalid && (confirmarSenha.touched || confirmarSenha.dirty) 
            || (confirmarSenha.value !== senha.value && (confirmarSenha.touched || confirmarSenha.dirty))"
            placeholder="Repita a senha">

          <div class="invalid-feedback">
            As senhas não coincidem
          </div>
        </div>

        <!-- GÊNERO -->
        <div class="mb-3">
          <label class="form-label">Gênero *</label>
          <select class="form-select"
            name="genero" ngModel required
            #genero="ngModel"
            [class.is-invalid]="genero.invalid && (genero.touched || genero.dirty)">

            <option value="">Selecione</option>
            <option>Feminino</option>
            <option>Masculino</option>
            <option>Outro</option>
          </select>

          <div class="invalid-feedback">
            Selecione um gênero
          </div>
        </div>

        <!-- CIDADE -->
        <div class="mb-3">
          <label class="form-label">Cidade *</label>
          <select class="form-select"
            name="cidade" ngModel required
            #cidade="ngModel"
            [class.is-invalid]="cidade.invalid && (cidade.touched || cidade.dirty)">

            <option value="">Selecione</option>
            <option>Colatina</option>
            <option>Marilândia</option>
            <option>Linhares</option>
            <option>Vitória</option>
            <option>Serra</option>
            <option>Outra</option>
          </select>

          <div class="invalid-feedback">
            Selecione uma cidade
          </div>
        </div>

        <!-- TERMOS -->
        <div class="form-check mb-3">
          <input type="checkbox" class="form-check-input"
            name="termos" ngModel required
            #termos="ngModel"
            [class.is-invalid]="termos.invalid && (termos.touched || termos.dirty)">

          <label class="form-check-label">
            Aceito os termos *
          </label>

          <div class="invalid-feedback d-block">
            É necessário aceitar os termos
          </div>
        </div>

        <!-- BOTÃO -->
        <button class="btn btn-success w-100 mt-3 shadow"
          type="submit"
          [disabled]="form.invalid">

          Cadastrar
        </button>

      </form>
    </div>

  </div>
</div>
